network:
  udp_port: 5005
  send_rate_hz: 50
  receiver_timeout_s: 0.5
  status_rate_hz: 2
  socket_timeout_s: 0.02

can:
  bitrate: 1000000
  interface: can0

piper:
  control_mode: 0x01
  move_mode: 0x01
  speed_percent: 100
  follow_mode: 0xAD
  gripper_default_effort: 1000
  joint_limits_deg:
    - [-154, 154]
    - [0, 195]
    - [-175, 0]
    - [-106, 106]
    - [-75, 75]
    - [-120, 120]
  gripper_limits_mm: [0, 100]

safety:
  enable_slew_limit: false
  startup_sync_required: false

logging:
  verbose_packets: false
